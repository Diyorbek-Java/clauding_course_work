{% extends 'base.html' %}
{% block title %}Organizations{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="fw-bold mb-0"><i class="bi bi-diagram-3-fill me-2 text-primary"></i>Organizations</h2>
        <p class="text-muted mb-0 small">Manage top-level organizations</p>
    </div>
    <button class="btn btn-primary" onclick="showCreateModal()">
        <i class="bi bi-plus-circle me-1"></i>Add Organization
    </button>
</div>

<div id="alert-container"></div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th class="ps-3">#</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th class="text-end pe-3">Actions</th>
                </tr>
            </thead>
            <tbody id="orgs-tbody">
                <tr><td colspan="5" class="text-center py-4 text-muted">
                    <div class="spinner-border spinner-border-sm me-2"></div>Loading…
                </td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Create / Edit Modal -->
<div class="modal fade" id="orgModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="orgModalTitle">Organization</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="org-form-error" class="alert alert-danger d-none"></div>
                <input type="hidden" id="org-id">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
                    <input type="text" id="org-name" class="form-control" placeholder="e.g. Acme Corp">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea id="org-description" class="form-control" rows="3"
                              placeholder="Brief description of the organization"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Head of Organization
                        <small class="text-muted fw-normal">(User ID, optional)</small>
                    </label>
                    <input type="number" id="org-head" class="form-control" placeholder="Leave blank if none">
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="org-active" checked>
                    <label class="form-check-label" for="org-active">Active</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveOrg()">
                    <i class="bi bi-check-lg me-1"></i>Save
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title text-danger"><i class="bi bi-exclamation-triangle-fill me-2"></i>Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">Are you sure you want to delete <strong id="delete-name"></strong>?</div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger btn-sm" id="confirm-delete-btn">Delete</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API_URL = '/api/organization/';
let orgModal, deleteModal;

document.addEventListener('DOMContentLoaded', () => {
    orgModal    = new bootstrap.Modal(document.getElementById('orgModal'));
    deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
    loadOrgs();
});

function onLoginSuccess() { loadOrgs(); }
function onLogout()       { loadOrgs(); }

async function loadOrgs() {
    const tbody = document.getElementById('orgs-tbody');
    const result = await apiRequest(API_URL);
    if (!result.ok) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-danger">Failed to load data.</td></tr>';
        return;
    }
    const orgs = result.data;
    if (!orgs.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">No organizations found. Add one to get started.</td></tr>';
        return;
    }
    tbody.innerHTML = orgs.map(o => `
        <tr>
            <td class="ps-3 text-muted small align-middle">${o.id}</td>
            <td class="align-middle fw-semibold">${escHtml(o.name)}</td>
            <td class="align-middle text-muted small">${o.description ? escHtml(o.description) : '—'}</td>
            <td class="align-middle">
                ${o.is_active
                    ? '<span class="badge bg-success-subtle text-success border border-success-subtle">Active</span>'
                    : '<span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle">Inactive</span>'}
            </td>
            <td class="text-end pe-3 align-middle">
                <button class="btn btn-sm btn-outline-primary me-1" onclick="editOrg(${o.id})" title="Edit">
                    <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="confirmDelete(${o.id}, '${escHtml(o.name)}')" title="Delete">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        </tr>`).join('');
}

function showCreateModal() {
    if (!getToken()) { showAlert('Please <a href="#" onclick="showLoginModal()">login</a> to create organizations.', 'warning'); return; }
    document.getElementById('orgModalTitle').textContent = 'Add Organization';
    document.getElementById('org-id').value          = '';
    document.getElementById('org-name').value         = '';
    document.getElementById('org-description').value  = '';
    document.getElementById('org-head').value         = '';
    document.getElementById('org-active').checked     = true;
    document.getElementById('org-form-error').classList.add('d-none');
    orgModal.show();
}

async function editOrg(id) {
    if (!getToken()) { showAlert('Please <a href="#" onclick="showLoginModal()">login</a> to edit organizations.', 'warning'); return; }
    const result = await apiRequest(`${API_URL}${id}/`);
    if (!result.ok) { showAlert('Failed to load organization.', 'danger'); return; }
    const o = result.data;
    document.getElementById('orgModalTitle').textContent = 'Edit Organization';
    document.getElementById('org-id').value          = o.id;
    document.getElementById('org-name').value         = o.name;
    document.getElementById('org-description').value  = o.description || '';
    document.getElementById('org-head').value         = o.head_of_organization || '';
    document.getElementById('org-active').checked     = o.is_active;
    document.getElementById('org-form-error').classList.add('d-none');
    orgModal.show();
}

async function saveOrg() {
    const id   = document.getElementById('org-id').value;
    const name = document.getElementById('org-name').value.trim();
    const errDiv = document.getElementById('org-form-error');
    if (!name) { errDiv.textContent = 'Name is required.'; errDiv.classList.remove('d-none'); return; }

    const body = {
        name,
        description:          document.getElementById('org-description').value.trim() || null,
        head_of_organization: document.getElementById('org-head').value || null,
        is_active:            document.getElementById('org-active').checked,
    };
    const result = await apiRequest(id ? `${API_URL}${id}/` : API_URL, id ? 'PUT' : 'POST', body);
    if (result.ok) {
        orgModal.hide();
        loadOrgs();
        showAlert(`Organization <strong>${escHtml(name)}</strong> ${id ? 'updated' : 'created'} successfully.`);
    } else {
        errDiv.textContent = formatErrors(result.data);
        errDiv.classList.remove('d-none');
    }
}

function confirmDelete(id, name) {
    if (!getToken()) { showAlert('Please <a href="#" onclick="showLoginModal()">login</a> to delete organizations.', 'warning'); return; }
    document.getElementById('delete-name').textContent = name;
    document.getElementById('confirm-delete-btn').onclick = () => deleteOrg(id);
    deleteModal.show();
}

async function deleteOrg(id) {
    const result = await apiRequest(`${API_URL}${id}/`, 'DELETE');
    deleteModal.hide();
    if (result.ok) {
        loadOrgs();
        showAlert('Organization deleted successfully.');
    } else {
        showAlert('Failed to delete organization.', 'danger');
    }
}

// ── Utilities ────────────────────────────────────────────────────────────────
function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatErrors(data) {
    if (typeof data === 'string') return data;
    return Object.entries(data).map(([k,v]) => `${k}: ${Array.isArray(v) ? v.join(', ') : v}`).join(' | ');
}
</script>
{% endblock %}
