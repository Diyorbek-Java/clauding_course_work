services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cw_claude
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "8432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DB_NAME: cw_claude
      DB_USER: postgres
      DB_PASSWORD: password123
      DB_HOST: db
      DB_PORT: 8432
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,51.120.123.248"
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  postgres_data:
