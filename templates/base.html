<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HR System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #e21e1e; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
        .table th { font-weight: 600; }
        .badge { font-size: 0.8em; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-building-fill-gear me-2"></i>HR System
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/organizations/"><i class="bi bi-diagram-3 me-1"></i>Organizations</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/departments/"><i class="bi bi-people me-1"></i>Departments</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/job-positions/"><i class="bi bi-briefcase me-1"></i>Job Positions</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/users/"><i class="bi bi-people me-1"></i>Users</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <span id="auth-status" class="text-white-50 small"></span>
                <button id="login-btn" class="btn btn-light btn-sm" onclick="showLoginModal()">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Login
                </button>
                <button id="logout-btn" class="btn btn-outline-light btn-sm d-none" onclick="logout()">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    {% block content %}{% endblock %}
</div>

<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-lock-fill me-2"></i>Login</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="login-error" class="alert alert-danger d-none"></div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" id="login-username" class="form-control"
                           placeholder="Enter username" onkeydown="if(event.key==='Enter') login()">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" id="login-password" class="form-control"
                           placeholder="Enter password" onkeydown="if(event.key==='Enter') login()">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="login()">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Login
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ── Auth helpers ──────────────────────────────────────────────────────────
    function getToken()    { return localStorage.getItem('authToken'); }
    function getUsername() { return localStorage.getItem('username'); }

    function updateAuthUI() {
        const token    = getToken();
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const authStatus = document.getElementById('auth-status');
        if (token) {
            loginBtn.classList.add('d-none');
            logoutBtn.classList.remove('d-none');
            authStatus.textContent = `Logged in as ${getUsername()}`;
        } else {
            loginBtn.classList.remove('d-none');
            logoutBtn.classList.add('d-none');
            authStatus.textContent = '';
        }
    }

    function showLoginModal() {
        document.getElementById('login-error').classList.add('d-none');
        document.getElementById('login-username').value = '';
        document.getElementById('login-password').value = '';
        new bootstrap.Modal(document.getElementById('loginModal')).show();
    }

    async function login() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const errDiv   = document.getElementById('login-error');
        if (!username || !password) {
            errDiv.textContent = 'Please enter username and password.';
            errDiv.classList.remove('d-none');
            return;
        }
        try {
            const resp = await fetch('/api/auth/token/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            const data = await resp.json();
            if (resp.ok) {
                localStorage.setItem('authToken', data.token);
                localStorage.setItem('username', username);
                bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
                updateAuthUI();
                if (typeof onLoginSuccess === 'function') onLoginSuccess();
            } else {
                errDiv.textContent = data.non_field_errors?.[0] || 'Invalid credentials.';
                errDiv.classList.remove('d-none');
            }
        } catch {
            errDiv.textContent = 'Network error. Please try again.';
            errDiv.classList.remove('d-none');
        }
    }

    function logout() {
        localStorage.removeItem('authToken');
        localStorage.removeItem('username');
        updateAuthUI();
        if (typeof onLogout === 'function') onLogout();
    }

    // ── API helper ────────────────────────────────────────────────────────────
    function authHeaders() {
        const token = getToken();
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Token ${token}`;
        return headers;
    }

    async function apiRequest(url, method = 'GET', body = null) {
        const opts = { method, headers: authHeaders() };
        if (body !== null) opts.body = JSON.stringify(body);
        let resp = await fetch(url, opts);
        // Stale/invalid token — clear it and retry anonymously (GET only)
        if (resp.status === 401 && getToken() && method === 'GET') {
            localStorage.removeItem('authToken');
            localStorage.removeItem('username');
            updateAuthUI();
            resp = await fetch(url, { method, headers: { 'Content-Type': 'application/json' } });
        }
        if (resp.status === 204) return { ok: true, data: null };
        const data = await resp.json();
        return { ok: resp.ok, status: resp.status, data };
    }

    // ── Alert helper ──────────────────────────────────────────────────────────
    function showAlert(msg, type = 'success', containerId = 'alert-container') {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${msg}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
        setTimeout(() => { if (container) container.innerHTML = ''; }, 4000);
    }

    updateAuthUI();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
