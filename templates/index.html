{% extends 'base.html' %}
{% block title %}HR System — Dashboard{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2 class="fw-bold"><i class="bi bi-speedometer2 me-2 text-primary"></i>Dashboard</h2>
        <p class="text-muted">Manage your organization's structure from one place.</p>
    </div>
</div>

<div id="alert-container"></div>

<div class="row g-4" id="stat-cards">
    <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="bg-primary bg-opacity-10 rounded-circle p-3">
                    <i class="bi bi-diagram-3-fill text-primary fs-3"></i>
                </div>
                <div>
                    <div class="text-muted small">Organizations</div>
                    <div class="fs-2 fw-bold" id="org-count">—</div>
                </div>
            </div>
            <div class="card-footer bg-transparent border-0">
                <a href="/organizations/" class="btn btn-sm btn-outline-primary w-100">
                    Manage <i class="bi bi-arrow-right ms-1"></i>
                </a>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="bg-success bg-opacity-10 rounded-circle p-3">
                    <i class="bi bi-people-fill text-success fs-3"></i>
                </div>
                <div>
                    <div class="text-muted small">Departments</div>
                    <div class="fs-2 fw-bold" id="dept-count">—</div>
                </div>
            </div>
            <div class="card-footer bg-transparent border-0">
                <a href="/departments/" class="btn btn-sm btn-outline-success w-100">
                    Manage <i class="bi bi-arrow-right ms-1"></i>
                </a>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="bg-warning bg-opacity-10 rounded-circle p-3">
                    <i class="bi bi-briefcase-fill text-warning fs-3"></i>
                </div>
                <div>
                    <div class="text-muted small">Job Positions</div>
                    <div class="fs-2 fw-bold" id="pos-count">—</div>
                </div>
            </div>
            <div class="card-footer bg-transparent border-0">
                <a href="/job-positions/" class="btn btn-sm btn-outline-warning w-100">
                    Manage <i class="bi bi-arrow-right ms-1"></i>
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadStats() {
    const [orgs, depts, positions] = await Promise.all([
        apiRequest('/api/organization/'),
        apiRequest('/api/departments/'),
        apiRequest('/api/jon-position/'),
    ]);
    document.getElementById('org-count').textContent  = orgs.ok  ? orgs.data.length  : '?';
    document.getElementById('dept-count').textContent = depts.ok ? depts.data.length : '?';
    document.getElementById('pos-count').textContent  = positions.ok ? positions.data.length : '?';
}
loadStats();
</script>
{% endblock %}
